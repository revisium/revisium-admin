fragment User on MeModel {
  id
  username
  email
  hasPassword
  organizationId
  role {
    id
    name
    permissions {
      id
      action
      subject
      condition
    }
  }
  organization {
    id
    userOrganization {
      role {
        name
        permissions {
          id
          action
          subject
          condition
        }
      }
    }
  }
}

query getMe {
  me {
    ...User
  }
}
